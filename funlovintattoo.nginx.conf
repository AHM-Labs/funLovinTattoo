server {
    server_name funlovintattoo.com www.funlovintattoo.com labs.azflix.lol;

    # --- General Settings ---
    # Allow 50MB for inquiry image uploads
    client_max_body_size 50M;

    # --- Location Block: Proxy to Astro (Port 4321) ---
    location / {
        proxy_pass http://localhost:4321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Location Block: Proxy to Server Gateway (Port 3000) ---
    location /api/v2/ {
        # Forward requests to the Node.js Gateway running on port 3000
        proxy_pass http://localhost:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Pass the real client IP and info
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logging
    access_log /var/log/nginx/funlovintattoo.access.log;
    error_log /var/log/nginx/funlovintattoo.error.log;

    # --- SSL (Assumed to be managed by Certbot) ---
    listen 443 ssl; 
    ssl_certificate /etc/letsencrypt/live/funlovintattoo.com/fullchain.pem; 
    ssl_certificate_key /etc/letsencrypt/live/funlovintattoo.com/privkey.pem; 
    include /etc/letsencrypt/options-ssl-nginx.conf; 
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP to HTTPS Redirect
server {
    listen 80;
    server_name funlovintattoo.com www.funlovintattoo.com labs.azflix.lol;
    return 301 https://$host$request_uri;
}
